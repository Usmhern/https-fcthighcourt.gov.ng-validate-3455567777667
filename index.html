<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affidavit Validation</title>
    <style>
        /* YOUR ORIGINAL BODY STYLING */
        body {
            background-color: #d1d5db; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* NEW LOADER OVERLAY - Matches Screenshot_20260514_110844_com.android.chrome.jpg */
        #loader-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: red//#d1d5db;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader-card {
            background: white;
            padding: 50px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .spinner {
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* YOUR ORIGINAL CARD STYLING - UNCHANGED */
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 77%;
            text-align: center;
            position: fixed;
            display: none; /* Initially hidden for the loader */
        }

        .photo-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .passport-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .passport-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .signature-box {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signature-box img {
            max-width: 100%;
            max-height: 100%;
        }

        .info-text {
            color: #333;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .highlight-green {
            color: #27ae60;
            font-weight: bold; /* Fixed your 2px bold typo */
        }

        .login-link {
            display: block;
            text-align: right;
            color: #333;
            text-decoration: underline;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- EXACT LOADER ELEMENT -->
    <div id="loader-overlay">
        <div class="loader-card">
            <svg class="spinner" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <g fill="#333">
                    <rect x="47" y="10" width="6" height="20" rx="3" opacity="1"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(30 50 50)" opacity="0.91"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(60 50 50)" opacity="0.83"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(90 50 50)" opacity="0.75"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(120 50 50)" opacity="0.66"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(150 50 50)" opacity="0.58"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(180 50 50)" opacity="0.5"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(210 50 50)" opacity="0.41"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(240 50 50)" opacity="0.33"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(270 50 50)" opacity="0.25"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(300 50 50)" opacity="0.16"/>
                    <rect x="47" y="10" width="6" height="20" rx="3" transform="rotate(330 50 50)" opacity="0.08"/>
                </g>
            </svg>
        </div>
    </div>

    <!-- YOUR ORIGINAL CARD -->
    <div class="card" id="main-card">
        <div class="photo-container">
            <div class="passport-circle">
                <img id="display-passport" src="aff.jpg" alt="Passport">
            </div>
            <div class="signature-box">
                <img id="display-sign" src="sign.jpg" alt="Signature">
            </div>
        </div>

        <div class="info-text">
            This is a <span class="highlight-green">GENERAL FORM OF AFFIDAVIT</span> 
            deposed by <span class="highlight-green" id="display-name">MARYAM MOHAMMED</span> 
            associated with code <span class="highlight-green" id="display-code">9WY989S83MAMO</span>. 
            it has been<br>found in our database and confirmed as <br><span class="highlight-green">VALID</span>
        </div>

        <a href="https://varms.fcthighcourt.gov.ng" class="login-link">Go to Login</a>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                document.getElementById('display-code').innerText = id;
                document.getElementById('display-name').innerText = "MARYAM MOHAMMED";
            }

            // TRIGGER THE 3 SECOND WAIT
            setTimeout(function() {
                document.getElementById('loader-overlay').style.display = 'none';
                document.getElementById('main-card').style.display = 'block';
            }, 1000);
        };
    </script>
</body>
</html>
