<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affidavit Validation</title>
    <style>
        body {
            background-color: #d1d5db; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Loading Screen Styles */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #d1d5db; /* Matches the body background */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .loader-card {
            background: white;
            padding: 60px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #333;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Main Card Styles */
        .card {
            background: white;
            padding: 40px 30px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 77%;
            text-align: center;
            display: none; /* Hidden initially */
        }

        .photo-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .passport-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 1px solid #ddd;
        }

        .passport-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .signature-box {
            width: 100px;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .signature-box img {
            max-width: 100%;
            max-height: 100%;
        }

        .info-text {
            color: #333;
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .highlight-green {
            color: #27ae60;
            font-weight: bold;
        }

        .login-link {
            display: block;
            text-align: right;
            color: #333;
            text-decoration: underline;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- The Loading Screen -->
    <div id="loader">
        <div class="loader-card">
            <div class="spinner"></div>
        </div>
    </div>

    <!-- The Actual Content -->
    <div class="card" id="main-content">
        <div class="photo-container">
            <div class="passport-circle">
                <img id="display-passport" src="aff.jpg" alt="Passport">
            </div>
            <div class="signature-box">
                <img id="display-sign" src="sign.jpg" alt="Signature">
            </div>
        </div>

        <div class="info-text">
            This is a <span class="highlight-green">GENERAL FORM OF AFFIDAVIT</span> 
            deposed by <span class="highlight-green" id="display-name">MARYAM MOHAMMED</span> 
            associated with code <span class="highlight-green" id="display-code">9WY989S83MAMO</span>. 
            it has been<br>found in our database and confirmed as <br><span class="highlight-green">VALID</span>
        </div>

        <a href="https://varms.fcthighcourt.gov.ng" class="login-link">Go to Login</a>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            // Set data immediately
            if (id) {
                document.getElementById('display-code').innerText = id;
                document.getElementById('display-name').innerText = "Aliyu Ibrahim";
            }

            // After 3 seconds, hide loader and show content
            setTimeout(function() {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            }, 3000); 
        };
    </script>
</body>
</html>
